name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # 1. Crear el archivo .env FÍSICO en el runner de GitHub
      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      # 2. Instalar dependencias (necesario para el build)
      - name: Install dependencies
        run: flutter pub get

      # 3. UN SOLO Build. Flutter incluirá el .env si está en assets
      - name: Build Web
        run: flutter build web --release

      # 4. Desplegar a Firebase
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_VIHOMEWEB }}"
          projectId: vihomewebflutter
          channelId: live