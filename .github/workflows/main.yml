name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main # O el nombre de tu rama principal

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Configurar Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # 2. Crear archivo .env desde secreto
      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          ${{ secrets.ENV_FILE }}
          EOF

      # 3. Instalar dependencias y compilar para web
      - run: flutter pub get
      - run: flutter build web --release

      # 4. Desplegar a Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          # Asegúrate de que el nombre coincida con el que pusiste en GitHub
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_VIHOMEWEB }}"
          projectId: vihomewebflutter # Reemplaza con tu ID real
          channelId: live # Esto lo manda directo a producción
