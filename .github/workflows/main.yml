name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main # O el nombre de tu rama principal

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Configurar Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # 2. Instalar dependencias y compilar para web
      - run: flutter pub get
      - run: flutter build web --release

      # 3. Desplegar a Firebase Hosting
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" # Opcional: ver nota abajo
          # Si usas el token clásico (FIREBASE_TOKEN):
          # uses: w9jds/firebase-action@master
          # with:
          #   args: deploy --only hosting
          # env:
          #   FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          projectId: vihomewebflutter
